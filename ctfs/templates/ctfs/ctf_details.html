{% extends "navbar_footer.html" %} 
{% load static %} 
{% block title %}

{{ ctf.title }}

{% endblock title %}

{% block content %}
<link rel="stylesheet" href="{% static 'ctfs/css/ctfs_details_style.css' %}" />

<div class="ctf-detail-container">
  <h2 class="ctf-title">{{ ctf.title }}</h2>

  <div class="ctf-meta">
    <p><strong>Type:</strong> {{ ctf.get_type_display }}</p>
    <p><strong>Date:</strong> {{ ctf.date }}</p>
  </div>

  <div class="ctf-description">
    <p>{{ ctf.description }}</p>
  </div>

  <form method="post" class="ctf-form">
    {% csrf_token %}
    <label for="answer">Enter Your Answer:</label>
    <input
      type="text"
      name="answer"
      id="answer"
      class="form-control"
      required
    />
    <button type="submit" class="btn">Submit</button>
  </form>
</div>
{% endblock content %}
